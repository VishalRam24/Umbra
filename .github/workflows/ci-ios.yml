name: CI iOS (skeleton)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-ios.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-ios.yml"

jobs:
  ios-build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Placeholder for Xcode and native iOS build
        run: |
          echo "Skeleton only."
          echo "Configure Xcode signing/profiles + Rust iOS targets in your real pipeline, then run:"
          echo "npm run build:ios"
