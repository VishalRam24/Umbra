name: CI Windows (skeleton)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - ".github/workflows/ci-windows.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - ".github/workflows/ci-windows.yml"

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Placeholder for native Windows build
        shell: powershell
        run: |
          Write-Host "Skeleton only."
          Write-Host "If Visual Studio Build Tools are configured, replace this step with:"
          Write-Host "npm run build:windows"
