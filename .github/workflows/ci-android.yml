name: CI Android (skeleton)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-android.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-android.yml"

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Placeholder for Android SDK and native build
        run: |
          echo "Skeleton only."
          echo "Install Android SDK/NDK + Java + Rust target in your real pipeline, then run:"
          echo "npm run build:android"
